name: Export Game

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. v1.0.0-beta)"
        required: false
        default: "dev"

env:
  GODOT_VERSION: "4.6.1"
  PROJECT_PATH: EchoesOfChoice
  GAME_NAME: EchoesOfChoice

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot || true
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true

      - name: Import project
        run: godot --headless --path $PROJECT_PATH --import || true

      - name: Export
        run: |
          mkdir -p build/windows
          godot --headless --path $PROJECT_PATH --export-release \
            "Windows Desktop" "$(pwd)/build/windows/${GAME_NAME}.exe"

      - name: Archive
        run: |
          cd build/windows
          zip -r ../../${GAME_NAME}-windows.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: ${{ env.GAME_NAME }}-windows.zip
          retention-days: 14

  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot || true
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true

      - name: Import project
        run: godot --headless --path $PROJECT_PATH --import || true

      - name: Export
        run: |
          mkdir -p build/linux
          godot --headless --path $PROJECT_PATH --export-release \
            "Linux" "$(pwd)/build/linux/${GAME_NAME}.x86_64"

      - name: Archive
        run: |
          cd build/linux
          chmod +x ${GAME_NAME}.x86_64
          zip -r ../../${GAME_NAME}-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: ${{ env.GAME_NAME }}-linux.zip
          retention-days: 14

  export-macos:
    name: macOS Export
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Godot
        run: |
          curl -sL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip
          sudo cp -r Godot.app /Applications/

      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          curl -sL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project
        run: /Applications/Godot.app/Contents/MacOS/Godot --headless --path $PROJECT_PATH --import || true

      - name: Setup signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          # Install Apple Developer ID intermediate certificate
          curl -sL -o AppleDevIDCA.cer \
            "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer"
          security import AppleDevIDCA.cer -k build.keychain
          rm AppleDevIDCA.cer
          # Install signing certificate
          security import cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" build.keychain
          # Verify identity is available
          security find-identity -v -p codesigning build.keychain
          rm cert.p12

      - name: Export
        run: |
          mkdir -p build/macos
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path $PROJECT_PATH \
            --export-release "macOS" "$(pwd)/build/macos/${GAME_NAME}.zip"

      - name: Sign app
        run: |
          cd build/macos
          unzip -q ${GAME_NAME}.zip
          APP_NAME=$(ls -d *.app)
          echo "Found app: $APP_NAME"
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "$APP_NAME"
          rm ${GAME_NAME}.zip
          zip -r -y ${GAME_NAME}.zip "$APP_NAME"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/macos
          APP_NAME=$(ls -d *.app)
          xcrun notarytool submit ${GAME_NAME}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          unzip -q -o ${GAME_NAME}.zip
          xcrun stapler staple "$APP_NAME"
          rm ${GAME_NAME}.zip
          zip -r -y ${GAME_NAME}.zip "$APP_NAME"

      - name: Rename archive
        run: mv build/macos/${GAME_NAME}.zip ${GAME_NAME}-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos
          path: ${{ env.GAME_NAME }}-macos.zip
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  release:
    name: Create GitHub Release
    needs: [export-windows, export-linux, export-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts with version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv artifacts/windows/${GAME_NAME}-windows.zip \
             "${GAME_NAME}-${TAG}-windows.zip"
          mv artifacts/linux/${GAME_NAME}-linux.zip \
             "${GAME_NAME}-${TAG}-linux.zip"
          mv artifacts/macos/${GAME_NAME}-macos.zip \
             "${GAME_NAME}-${TAG}-macos.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Echoes of Choice ${{ steps.version.outputs.tag }}"
          draft: true
          generate_release_notes: true
          files: |
            ${{ env.GAME_NAME }}-${{ steps.version.outputs.tag }}-windows.zip
            ${{ env.GAME_NAME }}-${{ steps.version.outputs.tag }}-linux.zip
            ${{ env.GAME_NAME }}-${{ steps.version.outputs.tag }}-macos.zip
